<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federal Bills Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #003f88; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .bill { padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Federal Bills Explainer - Connection Test</h1>
        
        <div id="api-status" class="status">Checking API...</div>
        <div id="bills-container"></div>
        
        <hr>
        <h3>Direct Links:</h3>
        <ul>
            <li><a href="http://localhost:8001/docs" target="_blank">API Documentation</a></li>
            <li><a href="http://localhost:3001" target="_blank">Frontend App (if running)</a></li>
            <li><a href="http://localhost:8001/bills" target="_blank">Raw API Bills Data</a></li>
        </ul>
    </div>

    <script>
        async function testAPI() {
            const statusEl = document.getElementById('api-status');
            const billsEl = document.getElementById('bills-container');
            
            try {
                const response = await fetch('http://localhost:8001/bills');
                const bills = await response.json();
                
                statusEl.className = 'status success';
                statusEl.textContent = '✅ API is working! Found ' + bills.length + ' bills';
                
                billsEl.innerHTML = '<h2>Bills in Database:</h2>';
                bills.forEach(bill => {
                    const billDiv = document.createElement('div');
                    billDiv.className = 'bill';
                    billDiv.innerHTML = `
                        <strong>${bill.bill_type.toUpperCase()}-${bill.number}</strong><br>
                        ${bill.title}<br>
                        <small>Public Law: ${bill.public_law_number || 'N/A'}</small>
                    `;
                    billsEl.appendChild(billDiv);
                });
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ API Error: ' + error.message;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
