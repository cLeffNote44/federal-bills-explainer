name: CI

on:
  push:
    branches: [ main, develop, feat/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install black ruff mypy
          black --check packages/py-core apps/api apps/ingestion || true
          ruff check . || true
          mypy packages/py-core --ignore-missing-imports || true

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_fbx
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_fbx
      DRY_RUN: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pip install -e packages/py-core
          pip install -r apps/api/requirements.txt
          pip install -r apps/ingestion/requirements.txt || true
      - name: Run migrations
        working-directory: apps/api
        run: alembic upgrade head
      - name: Run tests
        run: |
          pytest packages/py-core/tests --cov=fbx_core --cov-report=xml || true
          pytest apps/api/tests --cov=api --cov-report=xml || true
          pytest apps/ingestion/tests --cov=fbx_ingest --cov-report=xml || true
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install bandit safety
          bandit -r packages apps -f json -o bandit-report.json || true
          safety check --json > safety-report.json || true
      - uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: false
          tags: fbx-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm run lint || true
      - run: pnpm run test || true
      - run: pnpm run build

