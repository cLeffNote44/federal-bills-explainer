name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: https://staging.federalbills.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          NODE_ENV: production
        run: npm run build

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          pip install alembic psycopg2-binary
          cd infra/database
          alembic upgrade head

      - name: Build and push Docker images
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login $DOCKER_REGISTRY -u $DOCKER_USERNAME --password-stdin

          # Build API image
          docker build -t $DOCKER_REGISTRY/federal-bills-api:$IMAGE_TAG -f apps/api/Dockerfile .
          docker push $DOCKER_REGISTRY/federal-bills-api:$IMAGE_TAG

          # Build Frontend image
          docker build -t $DOCKER_REGISTRY/federal-bills-frontend:$IMAGE_TAG -f apps/frontend/Dockerfile .
          docker push $DOCKER_REGISTRY/federal-bills-frontend:$IMAGE_TAG

          # Tag as latest staging
          docker tag $DOCKER_REGISTRY/federal-bills-api:$IMAGE_TAG $DOCKER_REGISTRY/federal-bills-api:staging-latest
          docker push $DOCKER_REGISTRY/federal-bills-api:staging-latest

          docker tag $DOCKER_REGISTRY/federal-bills-frontend:$IMAGE_TAG $DOCKER_REGISTRY/federal-bills-frontend:staging-latest
          docker push $DOCKER_REGISTRY/federal-bills-frontend:staging-latest

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/federal-bills-explainer

            # Pull latest images
            docker-compose pull

            # Stop old containers
            docker-compose down

            # Start new containers
            docker-compose up -d

            # Wait for health check
            sleep 10

            # Verify deployment
            curl -f http://localhost:8000/monitoring/health || exit 1
            curl -f http://localhost:3000 || exit 1

      - name: Run smoke tests
        env:
          STAGING_URL: https://staging.federalbills.example.com
        run: |
          # Test API health
          curl -f $STAGING_URL/api/monitoring/health

          # Test frontend
          curl -f $STAGING_URL

      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Successful* ✅\n\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Branch:* ${{ github.ref_name }}\n*URL:* https://staging.federalbills.example.com"
                  }
                }
              ]
            }

      - name: Notify deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Failed* ❌\n\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Branch:* ${{ github.ref_name }}\n*Logs:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/federal-bills-explainer
            docker-compose down
            docker-compose up -d --force-recreate
