name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  # Pre-deployment checks
  pre-deployment:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Deploying version: $VERSION"

          # Validate semantic versioning
          if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Expected vX.Y.Z"
            exit 1
          fi

      - name: Check for breaking changes
        run: |
          # Check CHANGELOG for breaking changes
          if grep -q "BREAKING CHANGE" CHANGELOG.md; then
            echo "⚠️ Breaking changes detected in this release"
          fi

  # Build and test
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [pre-deployment]
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: federal_bills_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run full test suite
        run: |
          # Frontend tests
          cd apps/frontend
          npm ci
          npm test -- --coverage
          npm run build

          # API tests
          cd ../api
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pytest --cov=app

      - name: Build production artifacts
        run: |
          cd apps/frontend
          npm run build
          tar -czf frontend-build.tar.gz .next/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-builds
          path: |
            apps/frontend/frontend-build.tar.gz
          retention-days: 30

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-test]
    timeout-minutes: 30
    environment:
      name: production
      url: https://federalbills.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-builds
          path: ./builds

      - name: Create backup point
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            # Backup current deployment
            BACKUP_DIR="/opt/backups/federal-bills-$(date +%Y%m%d-%H%M%S)"
            mkdir -p $BACKUP_DIR
            cd /opt/federal-bills-explainer
            docker-compose ps > $BACKUP_DIR/containers.txt
            cp -r docker-compose.yml $BACKUP_DIR/

            # Backup database
            docker exec federal-bills-postgres pg_dump -U postgres federal_bills > $BACKUP_DIR/database.sql

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          pip install alembic psycopg2-binary
          cd infra/database
          alembic upgrade head

      - name: Build and push Docker images
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login $DOCKER_REGISTRY -u $DOCKER_USERNAME --password-stdin

          # Build and push API
          docker build -t $DOCKER_REGISTRY/federal-bills-api:$IMAGE_TAG -f apps/api/Dockerfile .
          docker push $DOCKER_REGISTRY/federal-bills-api:$IMAGE_TAG

          # Build and push Frontend
          docker build -t $DOCKER_REGISTRY/federal-bills-frontend:$IMAGE_TAG -f apps/frontend/Dockerfile .
          docker push $DOCKER_REGISTRY/federal-bills-frontend:$IMAGE_TAG

          # Tag with version and latest
          docker tag $DOCKER_REGISTRY/federal-bills-api:$IMAGE_TAG $DOCKER_REGISTRY/federal-bills-api:$VERSION_TAG
          docker tag $DOCKER_REGISTRY/federal-bills-api:$IMAGE_TAG $DOCKER_REGISTRY/federal-bills-api:latest
          docker push $DOCKER_REGISTRY/federal-bills-api:$VERSION_TAG
          docker push $DOCKER_REGISTRY/federal-bills-api:latest

          docker tag $DOCKER_REGISTRY/federal-bills-frontend:$IMAGE_TAG $DOCKER_REGISTRY/federal-bills-frontend:$VERSION_TAG
          docker tag $DOCKER_REGISTRY/federal-bills-frontend:$IMAGE_TAG $DOCKER_REGISTRY/federal-bills-frontend:latest
          docker push $DOCKER_REGISTRY/federal-bills-frontend:$VERSION_TAG
          docker push $DOCKER_REGISTRY/federal-bills-frontend:latest

      - name: Deploy with zero-downtime
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/federal-bills-explainer

            # Pull new images
            docker-compose pull

            # Rolling update (zero downtime)
            docker-compose up -d --no-deps --scale api=2 api
            sleep 10
            docker-compose up -d --no-deps --remove-orphans api

            docker-compose up -d --no-deps --scale frontend=2 frontend
            sleep 10
            docker-compose up -d --no-deps --remove-orphans frontend

            # Clean up old images
            docker image prune -f

      - name: Health check
        run: |
          # Wait for deployment to stabilize
          sleep 30

          # Check API health
          for i in {1..5}; do
            if curl -f https://api.federalbills.example.com/monitoring/health; then
              echo "API health check passed"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "API health check failed"
              exit 1
            fi
            sleep 10
          done

          # Check frontend
          curl -f https://federalbills.example.com

      - name: Run smoke tests
        run: |
          # Critical path smoke tests
          curl -f https://api.federalbills.example.com/bills
          curl -f https://federalbills.example.com

      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚀 Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful* 🚀\n\n*Version:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*URL:* https://federalbills.example.com"
                  }
                }
              ]
            }

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

  # Rollback job (manual trigger only)
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy-production]
    environment:
      name: production

    steps:
      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/federal-bills-explainer

            # Find latest backup
            LATEST_BACKUP=$(ls -t /opt/backups/ | head -1)

            echo "Rolling back to: $LATEST_BACKUP"

            # Restore database
            docker exec -i federal-bills-postgres psql -U postgres federal_bills < /opt/backups/$LATEST_BACKUP/database.sql

            # Restart with previous version
            docker-compose down
            docker-compose up -d --force-recreate

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.25.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "⚠️ Production rollback initiated",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Rollback Initiated* ⚠️\n\nDeployment failed and system has been rolled back to previous version.\n\n*Failed Commit:* ${{ github.sha }}\n*Logs:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
